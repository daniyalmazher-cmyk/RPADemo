# For more details on the format and content:
# https://github.com/robocorp/rcc/blob/master/docs/recipes.md#what-is-in-condayaml
# Tip: Adding a link to the release notes of the packages helps maintenance and security.

channels:
  - conda-forge

dependencies:
  - python=3.12.13                 # https://pyreadiness.org/3.10
  - uv=0.10.9                      # https://pypi.org/project/uv
  - pip:
    - rpaframework==32.0.0        # https://rpaframework.org/releasenotes.html
    - robocorp==3.1.1             # https://pypi.org/project/robocorp
    - robocorp-browser==2.4.0     # https://pypi.org/project/robocorp-browser
    - pandas==2.2.3               # https://pandas.pydata.org/docs/whatsnew/
    - openpyxl==3.1.5             # https://pypi.org/project/openpyxl
    - pdfplumber==0.11.4          # https://pypi.org/project/pdfplumber
    - reportlab==4.2.5            # https://pypi.org/project/reportlab